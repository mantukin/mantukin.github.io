<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Workshop Logo</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1e26;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at center, rgba(255,255,255,0.06) 0%, transparent 100%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            overflow: hidden;
            font-family: 'Consolas', monospace;
        }

        svg {
            max-width: 95vw;
            max-height: 90vh;
        }

        /* Интерактивные зоны для перезапуска анимации */
        .interactive-zone {
            cursor: pointer;
        }

        /* --- АНИМАЦИЯ ОТРИСОВКИ ЛОГОТИПА --- */
        .logo-piece {
            fill: transparent;
            stroke: white;
            stroke-width: 1.5px;
            stroke-dasharray: 2500;
            stroke-dashoffset: 2500;
            animation: drawLogo 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none; /* Чтобы событие hover не перебивалось путями */
        }

        .p1 { animation-delay: 0.1s; }
        .p2 { animation-delay: 0.3s; }
        .p3 { animation-delay: 0.5s; }
        .p4 { animation-delay: 0.7s; }

        @keyframes drawLogo {
            0% { stroke-dashoffset: 2500; fill: transparent; stroke-opacity: 1; }
            60% { stroke-dashoffset: 0; fill: transparent; stroke-opacity: 1; }
            100% { stroke-dashoffset: 0; fill: white; stroke-opacity: 0; }
        }

        /* --- АНИМАЦИЯ ОТРИСОВКИ ТЕКСТА --- */
        .workshop-letter {
            fill: transparent;
            stroke: white;
            stroke-width: 1px;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawText 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
        }

        /* Класс для плавного затухания перед перерисовкой */
        .fade-out {
            opacity: 0 !important;
            transition: opacity 0.4s ease-out !important;
        }

        .l1 { animation-delay: 0.2s; }
        .l2 { animation-delay: 0.3s; }
        .l3 { animation-delay: 0.4s; }
        .l4 { animation-delay: 0.5s; }
        .l5 { animation-delay: 0.6s; }
        .l6 { animation-delay: 0.7s; }
        .l7 { animation-delay: 0.8s; }
        .l8 { animation-delay: 0.9s; }

        @keyframes drawText {
            0% { stroke-dashoffset: 1000; fill: transparent; stroke-opacity: 1; }
            60% { stroke-dashoffset: 0; fill: transparent; stroke-opacity: 1; }
            100% { stroke-dashoffset: 0; fill: white; stroke-opacity: 0; }
        }

        /* --- АНИМАЦИЯ ПУНКТИРНЫХ ЛИНИЙ ЧЕРЕЗ МАСКУ --- */
        .mask-draw-path {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: revealMask 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .m1 { animation-delay: 0.5s; }
        .m2 { animation-delay: 0.8s; }
        .m3 { animation-delay: 1.1s; }
        .m4 { animation-delay: 1.4s; }

        @keyframes revealMask {
            0% { stroke-dashoffset: 600; }
            100% { stroke-dashoffset: 0; }
        }

        /* Бесконечное движение самого пунктира */
        .dash-arc-1 { animation: dash1 28s linear infinite; }
        .dash-arc-2 { animation: dash2 30s linear infinite; }
        .dash-arc-3 { animation: dash3 24s linear infinite; }
        .dash-line { animation: dash4 16s linear infinite; }

        @keyframes dash1 { to { stroke-dashoffset: 280; } }
        @keyframes dash2 { to { stroke-dashoffset: -300; } }
        @keyframes dash3 { to { stroke-dashoffset: 240; } }
        @keyframes dash4 { to { stroke-dashoffset: 320; } }

        /* Отрисовка центрального прицела (Origin) */
        .draw-outer { stroke-dasharray: 76; animation: drawOuter 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; }
        .draw-inner { stroke-dasharray: 32; animation: drawInner 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; animation-delay: 0.3s; }
        .draw-cross { stroke-dasharray: 65; animation: drawCross 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; animation-delay: 0.6s; }

        @keyframes drawOuter { 0%, 15% { stroke-dashoffset: 76; } 85%, 100% { stroke-dashoffset: 0; } }
        @keyframes drawInner { 0%, 15% { stroke-dashoffset: 32; } 85%, 100% { stroke-dashoffset: 0; } }
        @keyframes drawCross { 0%, 15% { stroke-dashoffset: 65; } 85%, 100% { stroke-dashoffset: 0; } }

        /* Плавное мигание узлов связи */
        .eng-node {
            animation: blinkNode 2.5s ease-in-out infinite alternate;
            transform-box: fill-box;
            transform-origin: center;
        }
        .eng-node:nth-child(even) { animation-delay: 1.2s; }
        
        @keyframes blinkNode {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Переключение координат R200/R199 */
        .coord-val-1 { animation: coordToggle1 6s steps(1) infinite; }
        .coord-val-2 { opacity: 0; animation: coordToggle2 6s steps(1) infinite; }
        .coord-deg-1 { animation: coordToggle1 8s steps(1) infinite; animation-delay: 2s; }
        .coord-deg-2 { opacity: 0; animation: coordToggle2 8s steps(1) infinite; animation-delay: 2s; }

        @keyframes coordToggle1 { 0%, 85%, 100% { opacity: 1; } 86%, 99% { opacity: 0; } }
        @keyframes coordToggle2 { 0%, 85%, 100% { opacity: 0; } 86%, 99% { opacity: 1; } }

        /* Толстые линии чертежа */
        .eng-bar { animation: pulseBar 5s ease-in-out infinite alternate; }
        @keyframes pulseBar { 0% { fill-opacity: 0.3; } 100% { fill-opacity: 0.7; } }

        /* Fallbacks */
        .eng-label { font-family: 'Consolas-Bold', 'Consolas', monospace; }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Функция для надежного перезапуска CSS-анимаций при наведении
            function setupReplayAnimation(zoneId, elementSelector, durationMs) {
                const zone = document.getElementById(zoneId);
                if (!zone) return;

                const fadeOutDuration = 400; // Время плавного исчезновения в мс

                // Блокируем триггер на время самой первой отрисовки (при загрузке страницы)
                let isAnimating = true;
                setTimeout(() => {
                    isAnimating = false;
                }, durationMs);

                zone.addEventListener('mouseenter', () => {
                    // Блокируем новые срабатывания, пока анимация не доиграет до конца
                    if (isAnimating) return;
                    isAnimating = true;

                    const elements = zone.querySelectorAll(elementSelector);
                    
                    // 1. Плавно скрываем элементы
                    elements.forEach(el => {
                        el.classList.add('fade-out');
                    });
                    
                    // 2. Ждем окончания затухания перед перерисовкой
                    setTimeout(() => {
                        // Убираем анимацию и снимаем класс затухания
                        elements.forEach(el => {
                            el.style.animation = 'none';
                            el.classList.remove('fade-out');
                        });
                        
                        // Принудительно вызываем reflow. 
                        // Важно: offsetWidth не работает для SVG-элементов, поэтому используем getBoundingClientRect()
                        void zone.getBoundingClientRect();

                        // Возвращаем оригинальную CSS-анимацию
                        elements.forEach(el => {
                            el.style.animation = ''; 
                        });

                        // Снимаем блокировку после завершения полного цикла
                        setTimeout(() => {
                            isAnimating = false;
                        }, durationMs);
                    }, fadeOutDuration);
                });
            }

            // Логотип: 3.5 сек анимация + 0.7 сек максимальная задержка = 4.2 сек
            setupReplayAnimation('logo-zone', '.logo-piece', 4200);
            
            // Текст: 3.0 сек анимация + 0.9 сек максимальная задержка = 3.9 сек
            setupReplayAnimation('text-zone', '.workshop-letter', 3900);
        });
    </script>
